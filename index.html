/* ==========================================================
   CSV UTILITIES (sezione inventory)
   ========================================================== */
function parseCSV(t,d){const ls=t.split(/\r?\n/).filter(l=>l.trim());if(ls.length<2)return{h:[],r:[]};const h=ls[0].split(d).map(x=>x.trim());const r=ls.slice(1).map(l=>{const c=l.split(d);const o={};h.forEach((k,i)=>o[k]=(c[i]||"").trim());return o});return{h,r}}
function fCol(hs,n){return hs.find(h=>h.toLowerCase()===n.toLowerCase())}

/* ==========================================================
   PARSER FATTURE PASSIVE DELDO
   Estrae righe pneumatico (ignora DPD, ecotasse, voci doganali)
   raggruppate per numero d'ordine, con dati cliente finale.
   ========================================================== */
async function extractTextFromPDF(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);
    const tc=await page.getTextContent();
    // ricostruisci righe usando coordinata Y
    const items=tc.items.map(it=>({str:it.str,x:it.transform[4],y:it.transform[5]}));
    items.sort((a,b)=>b.y-a.y || a.x-b.x);
    let curY=null,line=[];const lines=[];
    for(const it of items){
      if(curY===null||Math.abs(it.y-curY)<3){line.push(it);curY=curY??it.y}
      else{lines.push(line);line=[it];curY=it.y}
    }
    if(line.length)lines.push(line);
    for(const ln of lines){
      ln.sort((a,b)=>a.x-b.x);
      text += ln.map(x=>x.str).join(" ").replace(/\s+/g," ").trim() + "\n";
    }
    text += "\n";
  }
  return text;
}

function parseDeldo(text){
  // metadati fattura passiva (per riferimento)
  let supplierInvNum=null,supplierInvDate=null;
  const metaM=text.match(/(\d{8})\s+(\d{2}-\d{2}-\d{4})\s+([A-Z]{2}\d+)/);
  if(metaM){supplierInvNum=metaM[1];supplierInvDate=metaM[2]}

  // splitta per blocchi "numero d'ordine"
  const blocks=text.split(/numero d'ordine\s*:/i).slice(1);
  const orders=[];
  const skipKeywords=["eilandtoeslag","dpd","spedizione","trasporto","passenger car tyres","ecotassa","smaltimento"];

  for(const block of blocks){
    const ord=block.match(/(\d+)\s*-\s*(\d+)\s+Ref\.\s*:\s*(\d+)\s*-\s*(\d+)/);
    if(!ord)continue;
    const order={
      orderId1:ord[1],orderId2:ord[2],ref1:ord[3],ref2:ord[4],
      client:{name:"",street:"",city:"",country:"Italy"},
      items:[]
    };

    // estrai indirizzo
    const addrM=block.match(/indirizzo di\s+([\s\S]+)/i);
    if(addrM){
      const addrBlock=addrM[1];
      const lines=[];
      for(const raw of addrBlock.split("\n")){
        const s=raw.trim();
        if(!s)continue;
        // stop alla prima riga pneumatico/voce
        if(/^\d{1,3}\s+\d{2,3}\s+\d{2,3}/.test(s))break;
        if(/^\d+\s+DPD/i.test(s))break;
        lines.push(s);
      }
      const nameParts=[];let capCity="";let street="";
      // CAP italiano: 5 cifre seguite da spazio + nome città. Deve essere preceduto da
      // spazio/trattino/inizio (NON da altra cifra) altrimenti matcha pezzi di telefoni.
      const capRe=/(?:^|[\s\-])(\d{5}\s+\S.*)$/;
      for(const ln of lines){
        // riga con nome + CAP città sulla stessa linea (layout 2 colonne)
        const capInLine=ln.match(capRe);
        if(capInLine && !/^\d{5}\b/.test(ln)){
          const matchStart=capInLine.index+capInLine[0].length-capInLine[1].length;
          const left=ln.slice(0,matchStart).replace(/[-\s]+$/,"").trim();
          const right=capInLine[1].trim();
          if(left)nameParts.push(left);
          if(!capCity)capCity=right;
          continue;
        }
        if(ln==="Italy")continue;
        if(/^\d{5}\s/.test(ln)){if(!capCity)capCity=ln;continue}
        // telefono "puro" o "puro-": skip
        if(/^\d{7,}-?$/.test(ln))continue;
        // riga che è solo "telefono - telefono" o simili
        if(/^[\d\s\-]+$/.test(ln) && /\d{7,}/.test(ln))continue;
        if(/^(via|v\.le|viale|piazza|p\.zza|p\.za|corso|c\.so|largo|loc\.|str\.|str\s|strada)/i.test(ln)){
          if(!street)street=ln;
          continue;
        }
        const cleaned=ln.replace(/\s+Italy\s*$/,"").replace(/^[-\s,]+|[-\s,]+$/g,"");
        if(cleaned)nameParts.push(cleaned);
      }
      capCity=capCity.replace(/\s+Italy\s*$/,"").trim();
      let fullName=nameParts.join(" ");
      // rimuovi numeri di telefono (7+ cifre consecutive) ovunque
      fullName=fullName.replace(/-?\s*\d{7,}\s*-?/g," ").replace(/\s+/g," ").replace(/^[-\s,]+|[-\s,]+$/g,"");
      order.client={name:fullName,street,city:capCity,country:"Italy"};
    }

    // estrazione items: dalla parte dopo "Italy" (o dopo l'ultima riga indirizzo)
    // pulizia righe
    const cleanLines=[];
    const afterIt=block.split(/\bItaly\b/);
    const itemsSection=afterIt.length>1?afterIt.slice(1).join(" Italy "):block;
    for(const raw of itemsSection.split("\n")){
      const s=raw.trim();
      if(!s)continue;
      if(/^label\s*:/i.test(s))continue;
      if(/^\d{8,}$/.test(s))continue;
      if(/Pagina:|www\.deldo\.com/.test(s))continue;
      if(/condizioni generali/i.test(s))break;
      cleanLines.push(s);
    }

    // merge righe spezzate (descrizione su 2 righe)
    const merged=[];
    let i=0;
    while(i<cleanLines.length){
      let cur=cleanLines[i];
      const looksItem=/^\d{1,3}\s+\d/.test(cur);
      const endsPrices=/\d+[.,]\d{2}\s+\d+[.,]\d{2}\s*$/.test(cur);
      if(looksItem && !endsPrices && i+1<cleanLines.length){
        const nxt=cleanLines[i+1];
        if(/\d+[.,]\d{2}\s+\d+[.,]\d{2}\s*$/.test(nxt) && !/^\d{1,3}\s+\d{2,3}/.test(nxt)){
          cur=cur+" "+nxt;merged.push(cur);i+=2;continue;
        }else if(!/^\d{1,3}\s+\d{2,3}/.test(nxt) && i+2<cleanLines.length){
          const nxt2=cleanLines[i+2];
          if(/\d+[.,]\d{2}\s+\d+[.,]\d{2}\s*$/.test(nxt2)){
            cur=cur+" "+nxt+" "+nxt2;merged.push(cur);i+=3;continue;
          }
        }
      }
      merged.push(cur);i++;
    }

    const itemRe=/^(\d{1,3})\s+(.+?)\s+(\d+[.,]\d{2})\s+(\d+[.,]\d{2})\s*$/;
    for(const ln of merged){
      const m=ln.match(itemRe);
      if(!m)continue;
      const qty=parseInt(m[1]);
      const desc=m[2].trim();
      const price=parseFloat(m[3].replace(",","."));
      const total=parseFloat(m[4].replace(",","."));
      const dl=desc.toLowerCase();
      if(skipKeywords.some(k=>dl.includes(k)))continue;
      if(/\b\d{8}\b/.test(desc))continue;  // codice doganale
      if(!/\d{3}\s*[\/\s]\s*\d{2,3}\b/.test(desc))continue;  // sanity check misura
      order.items.push({quantity:qty,description:desc,unitPrice:price,total});
    }

    if(order.items.length>0)orders.push(order);
  }
  return {meta:{supplierInvNum,supplierInvDate},orders};
}

/* ==========================================================
   CALCOLO RICARICO PER FASCIA
   Dato un prezzo di acquisto, trova la fascia e applica markup
   ========================================================== */
function applyMarkup(price,tiers){
  const tier=tiers.find(t=>price>=parseFloat(t.min) && price<parseFloat(t.max))
    ||tiers[tiers.length-1];
  if(!tier)return price;
  const m=parseFloat(tier.markupPct)||0;
  const f=parseFloat(tier.flatFee)||0;
  return price*(1+m/100)+f;
}

function isoToIt(iso){if(!iso)return"";const[y,m,d]=iso.split("-");return`${d}/${m}/${y}`}
function nextInvoiceNumber(inv){
  const y=new Date().getFullYear();
  const num=(inv.invoiceYear===y?inv.lastInvoiceNumber:0)+1;
  return {year:y,num,formatted:`${y}/${String(num).padStart(4,"0")}`};
}

function Btn({children,onClick,v="pri",style,disabled,type}){

  return<button onClick={onClick} disabled={disabled} type={type||"button"} style={{padding:"8px 16px",borderRadius:8,border:bd,background:bg,color:cl,fontWeight:600,fontSize:13,cursor:disabled?"not-allowed":"pointer",opacity:disabled?.4:1,transition:"all .15s",fontFamily:"inherit",...style}}>{children}</button>
}

/* ==========================================================
   SEZIONE INVENTORY (codice esistente, invariato)
   ========================================================== */
function SuppliersTab({config:c,save}){
  const[ed,sEd]=useState(null);
  const[f,sF]=useState({name:"",delimiter:";",skuCol:"",eanCol:"",priceCol:"",stockCol:"",markupPct:10,flatFee:10});
  const nw=()=>{sF({name:"",delimiter:";",skuCol:"",eanCol:"",priceCol:"",stockCol:"",markupPct:10,flatFee:10});sEd("new")};
  const ed2=(i)=>{sF({...c.suppliers[i],stockCol:c.suppliers[i].stockCol||""});sEd(i)};
  const sv=()=>{if(!f.name||!f.skuCol||!f.eanCol||!f.priceCol)return;const s={...f,markupPct:parseFloat(f.markupPct)||0,flatFee:parseFloat(f.flatFee)||0};const l=[...c.suppliers];ed==="new"?l.push(s):(l[ed]=s);save({...c,suppliers:l});sEd(null)};
  const rm=i=>save({...c,suppliers:c.suppliers.filter((_,j)=>j!==i)});
  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <h3 style={{margin:0,color:"var(--text)",fontSize:17}}>Fornitori</h3><Btn onClick={nw}>+ Aggiungi</Btn>
    </div>
    {c.suppliers.length===0&&ed===null&&<Card><p style={{color:"var(--text-muted)",textAlign:"center",margin:0}}>Nessun fornitore configurato.</p></Card>}
    {c.suppliers.map((s,i)=><Card key={i}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div>
      <strong style={{color:"var(--text)",fontSize:15}}>{s.name}</strong>
      <div style={{marginTop:6,display:"flex",gap:6,flexWrap:"wrap"}}>
        <span style={S.badge("var(--badge-info)")}>SKU: {s.skuCol}</span><span style={S.badge("var(--badge-info)")}>EAN: {s.eanCol}</span>
        <span style={S.badge("var(--badge-info)")}>Prezzo: {s.priceCol}</span>
        {s.stockCol&&<span style={S.badge("var(--badge-info)")}>Stock: {s.stockCol}</span>}
        <span style={S.badge("var(--badge-ok)")}>+{s.markupPct}% + {s.flatFee}€</span>
      </div></div><div style={{display:"flex",gap:6}}><Btn v="ghost" onClick={()=>ed2(i)}>Modifica</Btn><Btn v="danger" onClick={()=>rm(i)}>✕</Btn></div></div></Card>)}
    {ed!==null&&<Card accent="#6366f1">
      <h4 style={{color:"var(--accent-form)",margin:"0 0 10px"}}>{ed==="new"?"Nuovo fornitore":"Modifica fornitore"}</h4>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:"0 14px"}}>
        <Inp label="Nome" value={f.name} onChange={e=>sF({...f,name:e.target.value})} placeholder="es. Deldo"/>
        <Sel label="Delimitatore" value={f.delimiter} onChange={e=>sF({...f,delimiter:e.target.value})} options={[{v:";",l:"Punto e virgola (;)"},{v:",",l:"Virgola (,)"},{v:"\t",l:"Tab"},{v:"|",l:"Pipe (|)"}]}/>
        <Inp label="Colonna SKU" value={f.skuCol} onChange={e=>sF({...f,skuCol:e.target.value})} placeholder="es. Article"/>
        <Inp label="Colonna EAN" value={f.eanCol} onChange={e=>sF({...f,eanCol:e.target.value})} placeholder="es. EAN"/>
        <Inp label="Colonna Prezzo" value={f.priceCol} onChange={e=>sF({...f,priceCol:e.target.value})} placeholder="es. Price"/>
        <Inp label="Colonna Stock (quantità)" value={f.stockCol} onChange={e=>sF({...f,stockCol:e.target.value})} placeholder="es. Stock"/>
        <Inp label="Ricarico %" type="number" value={f.markupPct} onChange={e=>sF({...f,markupPct:e.target.value})}/>
        <Inp label="Costo fisso aggiuntivo (€)" type="number" value={f.flatFee} onChange={e=>sF({...f,flatFee:e.target.value})}/>
      </div>
      <p style={{color:"var(--text-muted)",fontSize:12,margin:"6px 0"}}>Formula: (prezzo × {(1+(parseFloat(f.markupPct)||0)/100).toFixed(2)}) + {parseFloat(f.flatFee)||0}€</p>
      <p style={{color:"var(--text-muted)",fontSize:12,margin:"0 0 6px"}}>Stock: {f.stockCol?"la quantità verrà presa dalla colonna "+f.stockCol+" del fornitore vincente":"quantità fissa dal marketplace (se non imposti una colonna stock)"}</p>
      <div style={{display:"flex",gap:8}}><Btn v="ok" onClick={sv}>Salva</Btn><Btn v="ghost" onClick={()=>sEd(null)}>Annulla</Btn></div>
    </Card>}
  </div>
}

function MarketplacesTab({config:c,save}){
  const[ed,sEd]=useState(null);
  const[f,sF]=useState({code:"IT",quantity:8,leadtime:4});
  const nw=()=>{sF({code:"IT",quantity:8,leadtime:4});sEd("new")};
  const ed2=i=>{sF({...c.marketplaces[i]});sEd(i)};
  const sv=()=>{const m={...f,quantity:parseInt(f.quantity)||8,leadtime:parseInt(f.leadtime)||4};const l=[...c.marketplaces];ed==="new"?l.push(m):(l[ed]=m);save({...c,marketplaces:l});sEd(null)};
  const rm=i=>save({...c,marketplaces:c.marketplaces.filter((_,j)=>j!==i)});
  const info=code=>EU_MP.find(m=>m.code===code)||{name:code};
  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <h3 style={{margin:0,color:"var(--text)",fontSize:17}}>Marketplace</h3><Btn onClick={nw}>+ Aggiungi</Btn>
    </div>
    {c.marketplaces.length===0&&ed===null&&<Card><p style={{color:"var(--text-muted)",textAlign:"center",margin:0}}>Nessun marketplace configurato.</p></Card>}
    {c.marketplaces.map((m,i)=><Card key={i}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div>

function ConvertTab({config:c}){
  const[ups,sUps]=useState({});
  const[mpC,sMpC]=useState(c.marketplaces[0]?.code||"");
  const[qtyMode,sQtyMode]=useState("catalog");
  const[res,sRes]=useState(null);
  const hFile=useCallback((sn,file)=>{if(!file)return;sRes(null);const r=new FileReader();r.onload=e=>{sUps(p=>({...p,[sn]:{fn:file.name,d:e.target.result}}))};r.readAsText(file,"utf-8")},[]);
  const rmUp=n=>{sUps(p=>{const x={...p};delete x[n];return x});sRes(null)};
  const convert=()=>{
    const mp=c.marketplaces.find(m=>m.code===mpC);if(!mp)return;
    const bl=new Set(c.blacklist);const em={};
    let tR=0,tS=0,dup=0,blk=0;const errs=[];
    for(const[sn,up]of Object.entries(ups)){
      const sup=c.suppliers.find(s=>s.name===sn);if(!sup)continue;
      const{h,r}=parseCSV(up.d,sup.delimiter);
      const skC=fCol(h,sup.skuCol),enC=fCol(h,sup.eanCol),prC=fCol(h,sup.priceCol);
      const stC=sup.stockCol?fCol(h,sup.stockCol):null;
      if(!skC||!enC||!prC){const ms=[!skC&&sup.skuCol,!enC&&sup.eanCol,!prC&&sup.priceCol].filter(Boolean);errs.push(sn+": colonne non trovate: "+ms.join(", "));continue}
      if(sup.stockCol&&!stC){errs.push(sn+": colonna stock '"+sup.stockCol+"' non trovata");continue}
      for(const row of r){
        tR++;
        const ean=(row[enC]||"").trim(),sku=(row[skC]||"").trim();
        const rp=parseFloat((row[prC]||"0").replace(",","."));
        if(!ean||ean.length<8||!sku||isNaN(rp)||rp<=0){tS++;continue}
        if(bl.has(ean)){blk++;continue}
        const fp=rp*(1+sup.markupPct/100)+sup.flatFee;
        const stock=stC?parseInt(row[stC])||0:null;
        if(em[ean]){dup++;if(fp<em[ean].price)em[ean]={sku,ean,price:fp,supplier:sn,stock}}
        else em[ean]={sku,ean,price:fp,supplier:sn,stock}
      }
    }
    if(errs.length){sRes({error:errs.join("\n")});return}
    const hd="sku\tproduct-id\tproduct-id-type\tprice\titem-condition\tquantity\tadd-delete\tleadtime-to-ship";
    const ls=[hd];const sc={};
    const sorted=Object.values(em).sort((a,b)=>a.ean.localeCompare(b.ean));
    for(const it of sorted){
      let ps=it.price.toFixed(2);if(mpC!=="UK")ps=ps.replace(".",",");
      const qty=qtyMode==="fixed"?String(mp.quantity):(it.stock!==null?String(it.stock):String(mp.quantity));
      ls.push(it.sku+"\t"+it.ean+"\t4\t"+ps+"\t11\t"+qty+"\ta\t"+mp.leadtime);
      sc[it.supplier]=(sc[it.supplier]||0)+1;
    }
    const ct=ls.join("\r\n")+"\r\n";
    sRes({content:ct,total:sorted.length,totalRead:tR,totalSkipped:tS,duplicatesResolved:dup,blacklisted:blk,supplierCounts:sc});
  };
  const dl=()=>{if(!res?.content)return;const b=new Blob([res.content],{type:"text/plain;charset=utf-8"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="InventoryLoader_merged_"+mpC+"_"+new Date().toISOString().slice(0,10)+".txt";document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u)};
  if(!c.suppliers.length||!c.marketplaces.length)return<Card><p style={{color:"#f59e0b",textAlign:"center",margin:0}}>⚠️ Configura almeno un fornitore e un marketplace.</p></Card>;
  const uc=Object.keys(ups).length;
  return<div>
    <Card><Sel label="Marketplace di destinazione" value={mpC} onChange={e=>{sMpC(e.target.value);sRes(null)}} options={c.marketplaces.map(m=>({v:m.code,l:(EU_MP.find(x=>x.code===m.code)||{}).name||m.code}))}/></Card>
    <Card>
      <label style={S.label}>Sorgente quantità</label>
      <div style={{display:"flex",gap:12,marginTop:6}}>
        {[{v:"catalog",l:"📦 Quantità dal catalogo",d:"Usa la colonna stock del fornitore (fallback: quantità marketplace)"},{v:"fixed",l:"🔒 Quantità fissa marketplace",d:"Usa sempre la quantità configurata nel marketplace"}].map(o=>
          <div key={o.v} onClick={()=>{sQtyMode(o.v);sRes(null)}} style={{flex:1,padding:"12px 16px",borderRadius:10,border:qtyMode===o.v?"2px solid #6366f1":"2px solid var(--border)",background:qtyMode===o.v?"var(--bg-card)":"var(--bg-input)",cursor:"pointer",transition:"all .15s"}}>
            <div style={{fontWeight:600,fontSize:14,color:qtyMode===o.v?"var(--accent-form)":"var(--text-label)"}}>{o.l}</div>
            <div style={{fontSize:11,color:"var(--text-muted)",marginTop:4}}>{o.d}</div>
          </div>)}
      </div>
      {qtyMode==="catalog"&&!c.suppliers.some(s=>s.stockCol)&&<p style={{color:"#f59e0b",fontSize:12,margin:"8px 0 0"}}>⚠️ Nessun fornitore ha una colonna stock configurata — verrà usata la quantità del marketplace come fallback.</p>}
    </Card>
    <div style={{marginBottom:14}}>
      <label style={{...S.label,marginBottom:10}}>Carica i cataloghi fornitori</label>
      {c.suppliers.map(sup=>{const u=ups[sup.name];return<Card key={sup.name} style={{padding:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:8}}>
          <strong style={{color:"var(--text)",fontSize:14}}>{sup.name}</strong>
          <span style={S.badge("var(--badge-ok)")}>+{sup.markupPct}% + {sup.flatFee}€</span>
          {sup.stockCol&&<span style={S.badge("var(--badge-info)")}>Stock: {sup.stockCol}</span>}
        </div>{u&&<p style={{color:"#10b981",fontSize:12,margin:"4px 0 0"}}>✓ {u.fn}</p>}</div>
        <div style={{display:"flex",gap:6}}>
          {u&&<Btn v="danger" onClick={()=>rmUp(sup.name)} style={{fontSize:11,padding:"5px 10px"}}>✕</Btn>}
          <label style={{padding:"8px 16px",borderRadius:8,background:u?"var(--border)":"#6366f1",color:u?"var(--text)":"#fff",fontWeight:600,fontSize:13,cursor:"pointer"}}>
            {u?"Sostituisci":"Carica CSV"}<input type="file" accept=".csv,.txt,.tsv" style={{display:"none"}} onChange={e=>hFile(sup.name,e.target.files[0])}/>
          </label>
        </div>
      </Card>})}
    </div>
    <div style={{textAlign:"center",marginBottom:14}}>
      <Btn v="ok" onClick={convert} disabled={uc===0} style={{padding:"12px 40px",fontSize:15}}>⚡ Genera file unificato ({uc} {uc===1?"fornitore":"fornitori"})</Btn>
    </div>
    {res?.error&&<Card accent="#ef4444"><p style={{color:"#ef4444",margin:0,whiteSpace:"pre-wrap"}}>❌ {res.error}</p></Card>}
    {res?.content&&<Card accent="#10b981">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <h4 style={{color:"#10b981",margin:0}}>✓ File generato</h4>
        <Btn v="ok" onClick={dl} style={{fontSize:14}}>↓ Scarica .txt</Btn>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:14}}>
        {[["Prodotti nel file",res.total],["Righe lette",res.totalRead],["Scartate",res.totalSkipped],["Duplicati risolti",res.duplicatesResolved],["Blacklist",res.blacklisted]].map(([l,v])=>
          <div key={l} style={{background:"var(--bg-stat)",borderRadius:8,padding:"10px 14px",textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:700,color:"var(--text)"}}>{v.toLocaleString()}</div>
            <div style={{fontSize:11,color:"var(--text-label)",marginTop:2}}>{l}</div>
          </div>)}
      </div>
      <label style={{...S.label,marginBottom:8}}>Prodotti per fornitore (vincenti)</label>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {Object.entries(res.supplierCounts).map(([n,ct])=><div key={n} style={{background:"var(--bg-stat)",borderRadius:8,padding:"8px 14px",display:"flex",alignItems:"center",gap:8}}>
          <strong style={{color:"var(--text)",fontSize:13}}>{n}</strong><span style={{...S.badge("#6366f1"),color:"#fff"}}>{ct.toLocaleString()}</span>
        </div>)}
      </div>
    </Card>}
  </div>
}

function InvoiceGenTab({inv,saveInv}){
  const[file,sFile]=useState(null);
  const[parsing,sParsing]=useState(false);
  const[parsed,sParsed]=useState(null);
  const[parseErr,sParseErr]=useState(null);
  const[customerId,sCustomerId]=useState(inv.customers[0]?.id||"");
  const[invDate,sInvDate]=useState(todayIso());
  const[invNumOverride,sInvNumOverride]=useState("");
  const[generated,sGen]=useState(false);

  const next=useMemo(()=>nextInvoiceNumber(inv),[inv.lastInvoiceNumber,inv.invoiceYear]);
  const effectiveInvNum=invNumOverride.trim()||next.formatted;

  const handleFile=async(f)=>{
    if(!f)return;
    sFile(f);sParsed(null);sParseErr(null);sParsing(true);sGen(false);
    try{
      const txt=await extractTextFromPDF(f);
      const result=parseDeldo(txt);
      if(!result.orders.length){sParseErr("Nessun ordine trovato nel PDF. Verifica che sia una fattura Deldo valida.");}
      else sParsed(result);
    }catch(e){sParseErr("Errore nel parsing: "+e.message);console.error(e);}
    finally{sParsing(false);}
  };

  // calcola le righe finali con ricarico applicato
  const computed=useMemo(()=>{
    if(!parsed)return null;
    const lines=[];
    let totalNet=0,totalGross=0,totalQty=0;
    for(const ord of parsed.orders){
      for(const it of ord.items){
        const unitMarked=applyMarkup(it.unitPrice,inv.markupTiers);
        const lineTotal=unitMarked*it.quantity;
        const cost=it.unitPrice*it.quantity;
        totalNet+=cost;totalGross+=lineTotal;totalQty+=it.quantity;
        lines.push({
          orderRef:ord.ref2,
          clientName:ord.client.name,
          clientAddr:[ord.client.street,ord.client.city,ord.client.country].filter(Boolean).join(", "),
          quantity:it.quantity,
          description:it.description,
          unitCost:it.unitPrice,
          unitPrice:unitMarked,
          lineTotal,
          cost
        });
      }
    }
    return {lines,totalNet,totalGross,totalQty,margin:totalGross-totalNet};
  },[parsed,inv.markupTiers]);

  const customer=inv.customers.find(c=>String(c.id)===String(customerId));

  const generatePDF=()=>{
    if(!computed||!customer)return;

    // controllo duplicati
    const existing=(inv.invoices||[]).find(x=>x.number===effectiveInvNum);
    if(existing){
      const ok=confirm(`Esiste già una fattura con numero ${effectiveInvNum} (emessa il ${isoToIt(existing.date)} a ${existing.customerName}, totale € ${fmtEur(existing.total)}).\n\nProcedere comunque con l'emissione?\nLa nuova fattura sostituirà la voce nello storico.`);
      if(!ok)return;
    }

    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:"mm",format:"a4"});
    const pw=doc.internal.pageSize.getWidth();

    // ===== HEADER =====
    doc.setFont("helvetica","bold");doc.setFontSize(20);
    doc.text("FATTURA / INVOICE",pw-15,18,{align:"right"});

    doc.setFontSize(11);doc.setFont("helvetica","bold");
    doc.text(ISSUER.name,15,18);
    doc.setFont("helvetica","normal");doc.setFontSize(9);
    doc.text(ISSUER.address1,15,23);
    doc.text(ISSUER.address2,15,27);
    doc.text(ISSUER.country,15,31);
    doc.text("VAT: "+ISSUER.vat,15,35);

    // riquadro numero/data fattura
    doc.setDrawColor(180);doc.setLineWidth(.3);
    doc.line(15,42,pw-15,42);

    doc.setFontSize(8);doc.setFont("helvetica","bold");doc.setTextColor(90);
    doc.text("NUMERO FATTURA",15,48);
    doc.text("DATA FATTURA",70,48);
    doc.text("PARTITA IVA EMITTENTE",125,48);
    doc.setTextColor(0);doc.setFont("helvetica","normal");doc.setFontSize(11);
    doc.text(effectiveInvNum,15,53);
    doc.text(isoToIt(invDate),70,53);
    doc.text(ISSUER.vat,125,53);

    doc.line(15,58,pw-15,58);

    // ===== CLIENTE =====
    doc.setFontSize(8);doc.setFont("helvetica","bold");doc.setTextColor(90);
    doc.text("FATTURATO A:",15,65);
    doc.setTextColor(0);doc.setFont("helvetica","bold");doc.setFontSize(11);
    doc.text(customer.name,15,71);
    doc.setFont("helvetica","normal");doc.setFontSize(10);
    let yy=76;
    if(customer.address1){doc.text(customer.address1,15,yy);yy+=4.5}
    if(customer.zip||customer.city){doc.text(`${customer.zip||""} ${customer.city||""}`.trim(),15,yy);yy+=4.5}
    if(customer.country){doc.text(customer.country,15,yy);yy+=4.5}
    doc.setFont("helvetica","bold");
    doc.text("P.IVA: "+customer.vat,15,yy);

    // ===== TABELLA RIGHE =====
    const body=computed.lines.map(l=>[
      String(l.quantity),
      l.description,
      l.clientName+(l.clientAddr?"\n"+l.clientAddr:""),
      fmtEur(l.unitPrice),
      fmtEur(l.lineTotal)
    ]);

    doc.autoTable({
      startY:Math.max(yy+8,100),
      head:[["Q.tà","Descrizione pneumatico","Indirizzo di consegna","Prezzo unit. €","Totale €"]],
      body,
      theme:"grid",
      styles:{font:"helvetica",fontSize:8.5,cellPadding:2.5,lineColor:[200,200,200]},
      headStyles:{fillColor:[60,60,80],textColor:[255,255,255],fontStyle:"bold",fontSize:9},
      columnStyles:{
        0:{halign:"center",cellWidth:14},
        1:{cellWidth:60},
        2:{cellWidth:60,fontSize:7.5},
        3:{halign:"right",cellWidth:22},
        4:{halign:"right",cellWidth:22}
      },
      margin:{left:15,right:15}
    });

    let endY=doc.lastAutoTable.finalY+5;
    if(endY>250){doc.addPage();endY=20}

    // ===== TOTALI =====
    doc.setDrawColor(180);
    doc.line(120,endY,pw-15,endY);
    endY+=5;
    doc.setFontSize(10);doc.setFont("helvetica","normal");
    doc.text("Imponibile:",120,endY);doc.text("€ "+fmtEur(computed.totalGross),pw-15,endY,{align:"right"});endY+=5;
    doc.text("IVA (esente):",120,endY);doc.text("€ 0,00",pw-15,endY,{align:"right"});endY+=5;
    doc.setFont("helvetica","bold");doc.setFontSize(12);
    doc.text("TOTALE:",120,endY);doc.text("€ "+fmtEur(computed.totalGross),pw-15,endY,{align:"right"});endY+=8;

    // ===== NOTE =====
    doc.setFont("helvetica","italic");doc.setFontSize(9);doc.setTextColor(80);
    const noteLines=[
      "Operazione non imponibile IVA - Cessione intracomunitaria di beni",
      "ex art. 138 Direttiva 2006/112/CE - Reverse charge in capo al cessionario.",
      "VAT exempt - Intra-Community supply of goods (Art. 138 EU VAT Directive 2006/112/EC).",
    ];
    if(parsed?.meta?.supplierInvNum){
      noteLines.push("");
      noteLines.push(`Riferimento fornitura: fattura ${parsed.meta.supplierInvNum} del ${parsed.meta.supplierInvDate}`);
    }
    noteLines.forEach(l=>{doc.text(l,15,endY);endY+=4.5});

    // ===== FOOTER =====
    doc.setTextColor(120);doc.setFontSize(7.5);doc.setFont("helvetica","normal");
    const fy=doc.internal.pageSize.getHeight()-12;
    doc.text(`${ISSUER.name} • ${ISSUER.address1}, ${ISSUER.address2}, ${ISSUER.country} • VAT ${ISSUER.vat}`,pw/2,fy,{align:"center"});

    // download immediato del PDF
    const fname=`Fattura_${effectiveInvNum.replace(/[\/\\]/g,"-")}_${customer.name.replace(/[^a-z0-9]/gi,"_").slice(0,20)}.pdf`;
    doc.save(fname);

    // ===== STORICO: salva PDF in base64 + metadati =====
    const pdfDataUri=doc.output("datauristring"); // "data:application/pdf;base64,..."
    const pdfBase64=pdfDataUri.split(",")[1];

    const record={
      id:Date.now()+"_"+Math.random().toString(36).slice(2,8),
      number:effectiveInvNum,
      date:invDate,
      filename:fname,
      customerId:customer.id,
      customerName:customer.name,
      customerVat:customer.vat,
      total:computed.totalGross,
      cost:computed.totalNet,
      margin:computed.margin,
      qty:computed.totalQty,
      lineCount:computed.lines.length,
      supplierInvNum:parsed?.meta?.supplierInvNum||null,
      supplierInvDate:parsed?.meta?.supplierInvDate||null,
      lines:computed.lines.map(l=>({
        quantity:l.quantity,description:l.description,
        clientName:l.clientName,clientAddr:l.clientAddr,
        unitCost:l.unitCost,unitPrice:l.unitPrice,
        lineTotal:l.lineTotal
      })),
      pdfBase64,
      createdAt:new Date().toISOString()
    };

    // rimuovi eventuale duplicato (stesso numero) e aggiungi nuovo
    const filtered=(inv.invoices||[]).filter(x=>x.number!==effectiveInvNum);
    const newInvoices=[record,...filtered];
    // aggiorna numerazione solo se NON manuale e non era duplicato
    const newState={
      ...inv,
      invoices:newInvoices,
      ...(invNumOverride.trim()||existing?{}:{lastInvoiceNumber:next.num,invoiceYear:next.year})
    };

    try{
      saveInv(newState);
      sGen(true);
    }catch(e){
      // QuotaExceededError: localStorage pieno
      console.error(e);
      alert("⚠️ Storage pieno: il PDF è stato scaricato ma NON salvato nello storico.\nVai nella tab 'Storico' e cancella le fatture più vecchie per liberare spazio.");
      // salva senza il base64 per almeno mantenere i metadati
      try{
        const lightRecord={...record,pdfBase64:null,_storageOmitted:true};
        const lightInvoices=[lightRecord,...filtered];
        saveInv({...newState,invoices:lightInvoices});
        sGen(true);
      }catch(e2){
        console.error(e2);
      }
    }
  };

  return<div>
    {/* ====== STEP 1: CARICAMENTO PDF ====== */}
    <Card>
      <h3 style={{margin:"0 0 12px",color:"var(--text)",fontSize:17}}>1. Carica fattura passiva (PDF Deldo)</h3>
      {!file&&<label style={{display:"block",padding:"30px",borderRadius:10,background:"var(--bg-input)",border:"2px dashed var(--border-input)",textAlign:"center",cursor:"pointer"}}>
        <div style={{fontSize:32,marginBottom:6}}>📄</div>
        <div style={{color:"var(--text)",fontWeight:600}}>Clicca per caricare il PDF della fattura passiva</div>
        <div style={{color:"var(--text-muted)",fontSize:12,marginTop:4}}>Formato Deldo Autobanden NV (.pdf)</div>
        <input type="file" accept=".pdf" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
      </label>}
      {file&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:"var(--bg-input)",borderRadius:8,border:"1px solid var(--border-input)"}}>
        <div>
          <strong style={{color:"var(--text)"}}>📄 {file.name}</strong>
          {parsing&&<div style={{color:"#f59e0b",fontSize:12,marginTop:4}}>⏳ Estrazione in corso...</div>}
          {parsed&&<div style={{color:"#10b981",fontSize:12,marginTop:4}}>✓ {parsed.orders.length} ordini, {parsed.orders.reduce((s,o)=>s+o.items.reduce((ss,it)=>ss+it.quantity,0),0)} pezzi</div>}
          {parseErr&&<div style={{color:"#ef4444",fontSize:12,marginTop:4}}>❌ {parseErr}</div>}
        </div>
        <div style={{display:"flex",gap:6}}>
          <label style={{padding:"6px 12px",borderRadius:6,background:"var(--border)",color:"var(--text)",fontWeight:600,fontSize:12,cursor:"pointer"}}>
            Sostituisci<input type="file" accept=".pdf" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
          </label>
          <Btn v="danger" onClick={()=>{sFile(null);sParsed(null);sParseErr(null);sGen(false)}} style={{fontSize:11}}>✕</Btn>
        </div>
      </div>}
    </Card>

    {/* ====== STEP 2: ANTEPRIMA RIGHE ====== */}
    {parsed&&computed&&<Card>
      <h3 style={{margin:"0 0 12px",color:"var(--text)",fontSize:17}}>2. Anteprima righe estratte</h3>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:8,marginBottom:12}}>
        <div style={{background:"var(--bg-stat)",borderRadius:8,padding:"8px 12px"}}>
          <div style={{fontSize:11,color:"var(--text-label)"}}>Ordini</div>
          <div style={{fontSize:18,fontWeight:700}}>{parsed.orders.length}</div>
        </div>
        <div style={{background:"var(--bg-stat)",borderRadius:8,padding:"8px 12px"}}>
          <div style={{fontSize:11,color:"var(--text-label)"}}>Pezzi</div>
          <div style={{fontSize:18,fontWeight:700}}>{computed.totalQty}</div>
        </div>
        <div style={{background:"var(--bg-stat)",borderRadius:8,padding:"8px 12px"}}>
          <div style={{fontSize:11,color:"var(--text-label)"}}>Costo</div>
          <div style={{fontSize:18,fontWeight:700}}>€ {fmtEur(computed.totalNet)}</div>
        </div>
        <div style={{background:"var(--bg-stat)",borderRadius:8,padding:"8px 12px"}}>
          <div style={{fontSize:11,color:"var(--text-label)"}}>Vendita</div>
          <div style={{fontSize:18,fontWeight:700,color:"#10b981"}}>€ {fmtEur(computed.totalGross)}</div>
        </div>
        <div style={{background:"var(--bg-stat)",borderRadius:8,padding:"8px 12px"}}>
          <div style={{fontSize:11,color:"var(--text-label)"}}>Margine</div>
          <div style={{fontSize:18,fontWeight:700,color:"#10b981"}}>€ {fmtEur(computed.margin)}</div>
        </div>
      </div>
      <div style={{maxHeight:280,overflowY:"auto",border:"1px solid var(--border)",borderRadius:8}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead style={{background:"var(--bg-input)",position:"sticky",top:0}}>
            <tr>
              <th style={{padding:8,textAlign:"left",color:"var(--text-label)"}}>Q.tà</th>
              <th style={{padding:8,textAlign:"left",color:"var(--text-label)"}}>Pneumatico</th>
              <th style={{padding:8,textAlign:"left",color:"var(--text-label)"}}>Cliente / Indirizzo</th>
              <th style={{padding:8,textAlign:"right",color:"var(--text-label)"}}>Acquisto</th>
              <th style={{padding:8,textAlign:"right",color:"var(--text-label)"}}>Vendita</th>
              <th style={{padding:8,textAlign:"right",color:"var(--text-label)"}}>Totale</th>
            </tr>
          </thead>
          <tbody>
            {computed.lines.map((l,i)=><tr key={i} style={{borderTop:"1px solid var(--border)"}}>
              <td style={{padding:8}}>{l.quantity}</td>
              <td style={{padding:8}}>{l.description}</td>
              <td style={{padding:8,fontSize:11}}><div style={{fontWeight:600}}>{l.clientName}</div><div style={{color:"var(--text-muted)"}}>{l.clientAddr}</div></td>
              <td style={{padding:8,textAlign:"right",color:"var(--text-muted)"}}>€ {fmtEur(l.unitCost)}</td>
              <td style={{padding:8,textAlign:"right"}}>€ {fmtEur(l.unitPrice)}</td>
              <td style={{padding:8,textAlign:"right",fontWeight:600}}>€ {fmtEur(l.lineTotal)}</td>
            </tr>)}
          </tbody>
        </table>
      </div>
    </Card>}

    {/* ====== STEP 3: DATI FATTURA ====== */}
    {parsed&&<Card>
      <h3 style={{margin:"0 0 12px",color:"var(--text)",fontSize:17}}>3. Dati fattura attiva</h3>
      {inv.customers.length===0?
        <p style={{color:"#f59e0b",margin:0}}>⚠️ Nessun cliente configurato. Aggiungilo nella tab "Clienti".</p>
        :<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:"0 14px"}}>
            <Sel label="Cliente B2B *" value={customerId} onChange={e=>sCustomerId(e.target.value)} options={inv.customers.map(c=>({v:c.id,l:c.name+" - "+c.vat}))}/>
            <Inp label="Numero fattura" value={invNumOverride} onChange={e=>sInvNumOverride(e.target.value)} placeholder={next.formatted}/>
            <Inp label="Data fattura" type="date" value={invDate} onChange={e=>sInvDate(e.target.value)}/>
          </div>
          <p style={{color:"var(--text-muted)",fontSize:12,margin:"4px 0 12px"}}>
            Numero progressivo automatico: <strong>{next.formatted}</strong>. Se lasci vuoto il campo viene usato questo, e dopo l'emissione il contatore avanza automaticamente.
          </p>
          <div style={{textAlign:"center"}}>
            <Btn v="ok" onClick={generatePDF} disabled={!customer} style={{padding:"12px 40px",fontSize:15}}>
              📄 Genera fattura PDF
            </Btn>
          </div>
          {generated&&<div style={{textAlign:"center",marginTop:12,color:"#10b981",fontSize:13}}>
            ✓ PDF generato, scaricato e salvato in <strong>Storico</strong>. Prossima fattura: {nextInvoiceNumber({...inv,lastInvoiceNumber:next.num,invoiceYear:next.year}).formatted}
          </div>}
        </>}
    </Card>}
  </div>
}

/* ==========================================================
   STORICO FATTURE EMESSE
   Lista, ricerca, filtro, ridownload PDF, eliminazione
   ========================================================== */
function HistoryTab({inv,saveInv}){
  const invoices=inv.invoices||[];
  const[query,sQuery]=useState("");
  const[yearFilter,sYearFilter]=useState("all");
  const[expanded,sExpanded]=useState(null);

  // calcolo uso storage approssimativo
  const storageInfo=useMemo(()=>{
    try{
      const raw=localStorage.getItem(INV_KEY)||"";
      const bytes=new Blob([raw]).size;
      const mb=bytes/1024/1024;
      // stima quota: la maggior parte dei browser ha 5-10MB. Mostriamo barra su 5MB.
      const limit=5;
      const pct=Math.min(100,(mb/limit)*100);
      return {mb,pct,limit};
    }catch{return {mb:0,pct:0,limit:5};}
  },[invoices.length,inv]);

  // anni disponibili nello storico
  const years=useMemo(()=>{
    const set=new Set(invoices.map(x=>(x.date||"").slice(0,4)).filter(Boolean));
    return [...set].sort().reverse();
  },[invoices]);

  // filtri applicati
  const filtered=useMemo(()=>{
    let list=[...invoices];
    if(yearFilter!=="all")list=list.filter(x=>(x.date||"").startsWith(yearFilter));
    if(query.trim()){
      const q=query.trim().toLowerCase();
      list=list.filter(x=>
        (x.number||"").toLowerCase().includes(q) ||
        (x.customerName||"").toLowerCase().includes(q) ||
        (x.customerVat||"").toLowerCase().includes(q) ||
        (x.supplierInvNum||"").toLowerCase().includes(q)
      );
    }
    list.sort((a,b)=>(b.date||"").localeCompare(a.date||"")||(b.createdAt||"").localeCompare(a.createdAt||""));
    return list;
  },[invoices,query,yearFilter]);

  // statistiche aggregate sul filtrato
  const stats=useMemo(()=>{
    const totRev=filtered.reduce((s,x)=>s+(x.total||0),0);
    const totMargin=filtered.reduce((s,x)=>s+(x.margin||0),0);
    const totQty=filtered.reduce((s,x)=>s+(x.qty||0),0);
    return {count:filtered.length,totRev,totMargin,totQty};
  },[filtered]);

  const downloadPDF=(rec)=>{
    if(!rec.pdfBase64){
      alert("PDF non disponibile per questa fattura (non era stato salvato per limiti di storage).");
      return;
    }
    try{
      const bin=atob(rec.pdfBase64);
      const arr=new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
      const blob=new Blob([arr],{type:"application/pdf"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;a.download=rec.filename||`Fattura_${rec.number}.pdf`;
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url),1000);
    }catch(e){
      console.error(e);
      alert("Errore nel download del PDF: "+e.message);
    }
  };

  const removeOne=(rec)=>{
    if(!confirm(`Eliminare la fattura ${rec.number} dallo storico?\n\nIl PDF già scaricato rimarrà nel tuo computer, ma non potrà più essere ri-scaricato da qui.`))return;
    saveInv({...inv,invoices:invoices.filter(x=>x.id!==rec.id)});
  };

  const clearAll=()=>{
    if(!confirm("⚠️ Eliminare TUTTO lo storico? Questa operazione non può essere annullata."))return;
    if(!confirm("Sei davvero sicuro? Verranno persi i PDF di tutte le fatture emesse."))return;
    saveInv({...inv,invoices:[]});
  };

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,gap:12,flexWrap:"wrap"}}>
      <div>
        <h3 style={{margin:0,color:"var(--text)",fontSize:17}}>Storico fatture emesse <span style={{color:"var(--text-muted)",fontWeight:400,fontSize:13}}>({invoices.length})</span></h3>
        <p style={{margin:"4px 0 0",color:"var(--text-muted)",fontSize:13}}>Ogni fattura include il PDF originale ri-scaricabile.</p>
      </div>
      {invoices.length>0&&<Btn v="danger" onClick={clearAll} style={{fontSize:12}}>Svuota storico</Btn>}
    </div>

    {invoices.length===0?
      <Card><p style={{color:"var(--text-muted)",textAlign:"center",margin:0}}>Nessuna fattura emessa. Vai su "Genera fattura" per crearne una.</p></Card>
      :<>
        {/* statistiche */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:14}}>
          <div style={{background:"var(--bg-stat)",borderRadius:8,padding:"10px 14px"}}>
            <div style={{fontSize:11,color:"var(--text-label)"}}>Fatture {yearFilter==="all"?"totali":yearFilter}</div>
            <div style={{fontSize:22,fontWeight:700}}>{stats.count}</div>
          </div>
          <div style={{background:"var(--bg-stat)",borderRadius:8,padding:"10px 14px"}}>
            <div style={{fontSize:11,color:"var(--text-label)"}}>Pezzi venduti</div>
            <div style={{fontSize:22,fontWeight:700}}>{stats.totQty}</div>
          </div>
          <div style={{background:"var(--bg-stat)",borderRadius:8,padding:"10px 14px"}}>
            <div style={{fontSize:11,color:"var(--text-label)"}}>Fatturato</div>
            <div style={{fontSize:22,fontWeight:700,color:"#10b981"}}>€ {fmtEur(stats.totRev)}</div>
          </div>
          <div style={{background:"var(--bg-stat)",borderRadius:8,padding:"10px 14px"}}>
            <div style={{fontSize:11,color:"var(--text-label)"}}>Margine</div>
            <div style={{fontSize:22,fontWeight:700,color:"#10b981"}}>€ {fmtEur(stats.totMargin)}</div>
          </div>
        </div>

        {/* storage usage */}
        <Card style={{padding:12,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <span style={{fontSize:12,color:"var(--text-label)",fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Spazio storage</span>
            <span style={{fontSize:12,color:"var(--text-muted)"}}>{storageInfo.mb.toFixed(2)} MB / ~{storageInfo.limit} MB</span>
          </div>
          <div style={{background:"var(--bg-input)",borderRadius:6,height:8,overflow:"hidden"}}>
            <div style={{width:storageInfo.pct+"%",height:"100%",background:storageInfo.pct>80?"#ef4444":storageInfo.pct>60?"#f59e0b":"#10b981",transition:"width .3s"}}/>
          </div>
          {storageInfo.pct>80&&<p style={{color:"#ef4444",fontSize:12,margin:"6px 0 0"}}>⚠️ Spazio quasi esaurito. Elimina le fatture più vecchie per evitare problemi.</p>}
        </Card>

        {/* filtri */}
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:10,marginBottom:14}}>
          <input value={query} onChange={e=>sQuery(e.target.value)} placeholder="🔍 Cerca per numero, cliente, P.IVA, riferimento fornitore..." style={S.input}/>
          <select value={yearFilter} onChange={e=>sYearFilter(e.target.value)} style={S.input}>
            <option value="all">Tutti gli anni</option>
            {years.map(y=><option key={y} value={y}>{y}</option>)}
          </select>
        </div>

        {/* lista fatture */}
        {filtered.length===0?
          <Card><p style={{color:"var(--text-muted)",textAlign:"center",margin:0}}>Nessuna fattura corrisponde ai filtri.</p></Card>
          :filtered.map(rec=>{
            const isOpen=expanded===rec.id;
            return<Card key={rec.id} style={{padding:0,overflow:"hidden"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 18px",cursor:"pointer"}} onClick={()=>sExpanded(isOpen?null:rec.id)}>
                <div style={{display:"flex",alignItems:"center",gap:14,flex:1,minWidth:0}}>
                  <div style={{minWidth:90}}>
                    <div style={{fontWeight:700,color:"var(--text)",fontSize:14}}>{rec.number}</div>
                    <div style={{fontSize:11,color:"var(--text-muted)"}}>{isoToIt(rec.date)}</div>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,color:"var(--text)",fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{rec.customerName}</div>
                    <div style={{fontSize:11,color:"var(--text-muted)"}}>{rec.customerVat} • {rec.qty} pz • {rec.lineCount} righe</div>
                  </div>
                  <div style={{textAlign:"right",minWidth:100}}>
                    <div style={{fontWeight:700,color:"#10b981",fontSize:14}}>€ {fmtEur(rec.total)}</div>
                    {rec.margin!==undefined&&<div style={{fontSize:11,color:"var(--text-muted)"}}>marg. € {fmtEur(rec.margin)}</div>}
                  </div>
                </div>
                <div style={{display:"flex",gap:6,alignItems:"center",marginLeft:14}}>
                  {rec._storageOmitted&&<span style={S.badge("var(--badge-warn)")} title="PDF non salvato">⚠</span>}
                  {!rec._storageOmitted&&rec.pdfBase64&&<Btn v="ok" onClick={(e)=>{e.stopPropagation();downloadPDF(rec)}} style={{fontSize:12,padding:"6px 12px"}}>↓ PDF</Btn>}
                  <Btn v="danger" onClick={(e)=>{e.stopPropagation();removeOne(rec)}} style={{fontSize:12,padding:"6px 10px"}}>✕</Btn>
                  <span style={{color:"var(--text-muted)",fontSize:12,marginLeft:4,minWidth:14,textAlign:"center"}}>{isOpen?"▲":"▼"}</span>
                </div>
              </div>
              {isOpen&&<div style={{borderTop:"1px solid var(--border)",padding:"14px 18px",background:"var(--bg-input)"}}>
                {rec.supplierInvNum&&<div style={{fontSize:12,color:"var(--text-muted)",marginBottom:10}}>
                  Riferimento fornitura: fattura <strong>{rec.supplierInvNum}</strong> del {rec.supplierInvDate}
                </div>}
                <div style={{maxHeight:240,overflowY:"auto",border:"1px solid var(--border)",borderRadius:6}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead style={{background:"var(--bg-card)",position:"sticky",top:0}}>
                      <tr>
                        <th style={{padding:6,textAlign:"left",color:"var(--text-label)"}}>Q.tà</th>
                        <th style={{padding:6,textAlign:"left",color:"var(--text-label)"}}>Pneumatico</th>
                        <th style={{padding:6,textAlign:"left",color:"var(--text-label)"}}>Cliente / Indirizzo</th>
                        <th style={{padding:6,textAlign:"right",color:"var(--text-label)"}}>Prezzo</th>
                        <th style={{padding:6,textAlign:"right",color:"var(--text-label)"}}>Totale</th>
                      </tr>
                    </thead>
                    <tbody>
                      {(rec.lines||[]).map((l,i)=><tr key={i} style={{borderTop:"1px solid var(--border)"}}>
                        <td style={{padding:6}}>{l.quantity}</td>
                        <td style={{padding:6}}>{l.description}</td>
                        <td style={{padding:6,fontSize:11}}><div style={{fontWeight:600}}>{l.clientName}</div><div style={{color:"var(--text-muted)"}}>{l.clientAddr}</div></td>
                        <td style={{padding:6,textAlign:"right"}}>€ {fmtEur(l.unitPrice)}</td>
                        <td style={{padding:6,textAlign:"right",fontWeight:600}}>€ {fmtEur(l.lineTotal)}</td>
                      </tr>)}
                    </tbody>
                  </table>
                </div>
              </div>}
            </Card>;
          })
        }
      </>
    }
  </div>
}

/* ==========================================================
   SETTINGS - Numerazione
   ========================================================== */
function InvoiceSettingsTab({inv,saveInv}){
  const[year,sYear]=useState(inv.invoiceYear);
  const[num,sNum]=useState(inv.lastInvoiceNumber);
  const sv=()=>{saveInv({...inv,invoiceYear:parseInt(year)||new Date().getFullYear(),lastInvoiceNumber:parseInt(num)||0});alert("Salvato.")};
  const reset=()=>{if(confirm("Reset numerazione a 0?"))saveInv({...inv,invoiceYear:new Date().getFullYear(),lastInvoiceNumber:0})};
  const next=nextInvoiceNumber(inv);
  return<div>
    <h3 style={{margin:"0 0 14px",color:"var(--text)",fontSize:17}}>Impostazioni fatturazione</h3>
    <Card>
      <h4 style={{margin:"0 0 10px",color:"var(--accent-form)"}}>Numerazione fatture</h4>
      <p style={{color:"var(--text-muted)",fontSize:13,margin:"0 0 12px"}}>La prossima fattura avrà numero <strong style={{color:"var(--text)"}}>{next.formatted}</strong>.</p>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:"0 14px"}}>
        <Inp label="Anno corrente" type="number" value={year} onChange={e=>sYear(e.target.value)}/>
        <Inp label="Ultimo numero emesso" type="number" value={num} onChange={e=>sNum(e.target.value)}/>
      </div>
      <div style={{display:"flex",gap:8}}>
        <Btn v="ok" onClick={sv}>Salva</Btn>
        <Btn v="danger" onClick={reset}>Reset numerazione</Btn>
      </div>
    </Card>
    <Card>
      <h4 style={{margin:"0 0 10px",color:"var(--accent-form)"}}>Dati azienda emittente</h4>
      <p style={{color:"var(--text-muted)",fontSize:13,margin:"0 0 8px"}}>Questi dati sono fissi e impostati nel codice. Per modificarli aggiorna l'oggetto <code style={{background:"var(--bg-input)",padding:"1px 5px",borderRadius:4}}>ISSUER</code>.</p>
      <div style={{background:"var(--bg-input)",padding:"12px 14px",borderRadius:8,fontSize:13}}>
        <div><strong>{ISSUER.name}</strong></div>
        <div style={{color:"var(--text-muted)"}}>{ISSUER.address1}</div>
        <div style={{color:"var(--text-muted)"}}>{ISSUER.address2}</div>
        <div style={{color:"var(--text-muted)"}}>{ISSUER.country}</div>
        <div style={{marginTop:6}}><span style={S.badge("var(--badge-info)")}>VAT: {ISSUER.vat}</span></div>
      </div>
    </Card>
  </div>
}

/* ==========================================================
   APP
   ========================================================== */
function ThemeToggle({theme,toggle}){
  return<button onClick={toggle} title={theme==="dark"?"Passa a light mode":"Passa a dark mode"} style={{background:"var(--bg-input)",border:"1px solid var(--border-input)",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:16,lineHeight:1,color:"var(--text)",transition:"all .15s"}}>
    {theme==="dark"?"☀️":"🌙"}
  </button>
}

function App(){
  const[mode,sMode]=useState(()=>localStorage.getItem("gw-mode")||"inventory");
  const[c,sC]=useState(DEFAULT);
  const[inv,sInvSt]=useState(DEFAULT_INV);
  const[tab,sTab]=useState("convert");
  const[invTab,sInvTab]=useState("generate");
  const[ok,sOk]=useState(false);
  const[theme,sTheme]=useState(()=>localStorage.getItem("amz-theme")||"dark");

  useEffect(()=>{document.body.setAttribute("data-theme",theme)},[theme]);
  useEffect(()=>{sC(load());sInvSt(loadInv());sOk(true)},[]);

  const save=cfg=>{sC(cfg);persist(cfg)};
  const saveInv=cfg=>{sInvSt(cfg);persistInv(cfg)};
  const toggleTheme=()=>{const t=theme==="dark"?"light":"dark";sTheme(t);localStorage.setItem("amz-theme",t)};
  const setMode=m=>{sMode(m);localStorage.setItem("gw-mode",m)};

  if(!ok)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text-muted)"}}>Caricamento...</div>;

  const tabs=mode==="inventory"
    ?[{id:"convert",label:"⚡ Converti"},{id:"suppliers",label:"🏭 Fornitori",n:c.suppliers.length},{id:"marketplaces",label:"🌍 Marketplace",n:c.marketplaces.length},{id:"blacklist",label:"🚫 Blacklist",n:c.blacklist.length}]
    :[{id:"generate",label:"📄 Genera fattura"},{id:"history",label:"📚 Storico",n:(inv.invoices||[]).length},{id:"customers",label:"👥 Clienti",n:inv.customers.length},{id:"markup",label:"💰 Ricarichi",n:inv.markupTiers.length},{id:"settings",label:"⚙️ Impostazioni"}];

  const curTab=mode==="inventory"?tab:invTab;
  const setCurTab=mode==="inventory"?sTab:sInvTab;

  return<div>
    <div className="app-header" style={{background:"linear-gradient(135deg,var(--bg-header-start) 0%,var(--bg-header-end) 100%)",borderBottom:"1px solid var(--border)",padding:"20px 32px"}}>
      <div style={{maxWidth:1300,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",gap:14,flexWrap:"wrap"}}>
        <div>
          <h1 style={{margin:0,fontSize:24,fontWeight:700,letterSpacing:-.5}}>
            <span style={{color:"#6366f1"}}>▸</span> {mode==="inventory"?"Amazon Inventory Converter":"Global Way Invoicing"}
            <span style={{fontSize:12,color:"var(--text-muted)",fontWeight:400,marginLeft:8}}>v4</span>
          </h1>
          <p style={{margin:"4px 0 0",color:"var(--text-muted)",fontSize:13}}>
            {mode==="inventory"
              ?"Multi-fornitore • Merge per EAN • Prezzo più basso vince • Stock dal catalogo"
              :"Parsing fatture passive Deldo • Fattura attiva intracomunitaria • Ricarichi per fascia"}
          </p>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <div className="modeswitch">
            <button className={mode==="inventory"?"act":""} onClick={()=>setMode("inventory")}>📦 Inventory</button>
            <button className={mode==="invoicing"?"act":""} onClick={()=>setMode("invoicing")}>🧾 Fatturazione</button>
          </div>
          <ThemeToggle theme={theme} toggle={toggleTheme}/>
        </div>
      </div>
    </div>
    <div className="app-tabs" style={{display:"flex",gap:0,borderBottom:"1px solid var(--border)",padding:"0 32px",overflowX:"auto"}}>
      <div style={{maxWidth:1300,margin:"0 auto",width:"100%",display:"flex"}}>
        {tabs.map(t=><button key={t.id} onClick={()=>setCurTab(t.id)} style={{padding:"12px 20px",background:"none",border:"none",color:curTab===t.id?"var(--tab-active)":"var(--tab-inactive)",borderBottom:curTab===t.id?"2px solid #6366f1":"2px solid transparent",cursor:"pointer",fontWeight:600,fontSize:14,transition:"all .15s",whiteSpace:"nowrap",fontFamily:"inherit"}}>
          {t.label}{t.n!==undefined&&<span style={{marginLeft:6,background:"var(--tab-badge)",padding:"2px 8px",borderRadius:10,fontSize:11}}>{t.n}</span>}
        </button>)}
      </div>
    </div>
    <div className="app-content" style={{padding:28,maxWidth:820,margin:"0 auto"}}>
      {mode==="inventory"&&<>
        {tab==="suppliers"&&<SuppliersTab config={c} save={save}/>}
        {tab==="marketplaces"&&<MarketplacesTab config={c} save={save}/>}
        {tab==="blacklist"&&<BlacklistTab config={c} save={save}/>}
        {tab==="convert"&&<ConvertTab config={c}/>}
      </>}
      {mode==="invoicing"&&<>
        {invTab==="generate"&&<InvoiceGenTab inv={inv} saveInv={saveInv}/>}
        {invTab==="history"&&<HistoryTab inv={inv} saveInv={saveInv}/>}
        {invTab==="customers"&&<CustomersTab inv={inv} saveInv={saveInv}/>}
        {invTab==="markup"&&<MarkupTiersTab inv={inv} saveInv={saveInv}/>}
        {invTab==="settings"&&<InvoiceSettingsTab inv={inv} saveInv={saveInv}/>}
      </>}
    </div>
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
